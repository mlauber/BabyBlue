# This file contains common pin mappings for the BigTreeTech Octopus V1.
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference


# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON2.4 350mm BigTreeTech OctoPus V1 TMC2209 UART config

## ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0                         #This finds the UUID of a canbus device
## python3 ~/klipper/lib/canboot/flash_can.py -u <UUID of device to be flashed>           #This is how you flash a canboot device with klipper.  
## See SHT36 V3 for instructions on canboot flashing: https://mellow.klipper.cn/en/docs/ProductDoc/ToolBoard/fly-sht36/sht36_v3/flash/can


[duplicate_pin_override]
pins: PF6,PF7,PB6
#   A comma separated list of pins that may be used multiple times in
#   a config file without normal error checks. This parameter must be
#   provided.


# Mainsail settings
[include mainsail.cfg]
[include update_git.cfg]
[include timelapse.cfg]
[include stealthburner_leds.cfg]
#[include Idle_Timeout.cfg]
#[include adxl.cfg]
#[include bedfans.cfg]
#[include chamber_heater.cfg]
[include mmu/base/*.cfg]
[include mmu/optional/client_macros.cfg]
[include mmu/addons/blobifier.cfg]
#[include mmu/addons/mmu_erec_cutter.cfg]


[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
canbus_uuid: 99415db7c177

[mcu SHT36]
canbus_uuid: 5ab2fb5d73c4


# embedded temperature sensor
[temperature_sensor SHT36]
sensor_type: temperature_mcu
sensor_mcu: SHT36
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100


[printer]
kinematics: corexy
max_velocity: 300  
max_accel: 3900             #Max 4000
max_z_velocity: 15          #Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

#####################################################################
#   X/Y Stepper Settings
#####################################################################

##  B Stepper - Left
##  Connected to MOTOR_0
##  Endstop connected to DIAG_0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: ^SHT36:gpio22
position_min: 0
position_endstop: 250
position_max: 250
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x]
uart_pin: PC4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  A Stepper - Right
##  Connected to MOTOR_1
##  Endstop connected to DIAG_1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: PG9
position_min: 0
position_endstop: 257
position_max: 257
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y]
uart_pin: PD11
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0
 
#####################################################################
#   Z Stepper Settings
#####################################################################

## Z0 Stepper - Front Left
##  Connected to MOTOR_2
##  Endstop connected to DIAG_2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop # use beacon as virtual endstop
homing_retract_dist: 0 # beacon needs this to be set to 0
position_max: 230
position_min: -5
homing_speed: 8
second_homing_speed: 3

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PC6
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z1 Stepper - Rear Left
##  Connected to MOTOR_3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2 #!PA0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PC7
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z2 Stepper - Rear Right
##  Connected to MOTOR_4
[stepper_z2]
step_pin: PF9
dir_pin:PF10
enable_pin: !PG2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PF2
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

##  Z3 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z3]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PE4
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0


#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin:SHT36:gpio7
dir_pin:SHT36:gpio6
enable_pin: !SHT36:gpio14
microsteps: 16
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin:SHT36:gpio23
rotation_distance: 	5.568
#Be sure to calibrate
#gear_ratio: 44:8, 25:17
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
filament_diameter: 1.75
##  Validate the following thermistor type to make sure it is correct
##  See https://www.klipper3d.org/Config_Reference.html#common-thermistors for additional options
sensor_type: Generic 3950 #ATC Semitec 104NT-4-R025H42G
sensor_pin: SHT36:gpio27
min_temp: 10
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
max_extrude_only_distance: 300
#control = pid
#pid_Kp=19.942
#pid_Ki=0.768
#pid_Kd=129.375

##  Try to keep pressure_advance below 1.0
pressure_advance: 0.02 
##  Default is 0.040, leave stock
pressure_advance_smooth_time: 0.040

##  E0 on MOTOR6
##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder]
uart_pin:SHT36:gpio15
interpolate:False
run_current: 0.45
sense_resistor:0.110
stealthchop_threshold: 999999

#####################################################################
#       Chamber Thermistor 
#####################################################################

[temperature_sensor chamber]
sensor_type: ATC Semitec 104GT-2 # Common type for Voron chamber thermistors
sensor_pin: PF4                  # The pin your thermistor is connected to (e.g., z:P0.24)
min_temp: 0                      # Minimum temperature reading
max_temp: 100                    # Maximum temperature reading
gcode_id: C                      # A unique identifier for this sensor



#####################################################################
#   ADXL345    
#####################################################################

## https://www.klipper3d.org/Measuring_Resonances.html?h=adxl#adxl345
[lis2dw sht36_adxl345]
cs_pin: SHT36:gpio12
spi_software_sclk_pin: SHT36:gpio2
spi_software_mosi_pin: SHT36:gpio3
spi_software_miso_pin: SHT36:gpio4
#--------------------------------------------------------------------
[resonance_tester]
accel_chip: lis2dw
  probe_points: 125, 125, 50
# Somewhere slightly above the middle of your print bed
min_freq: 5
max_freq: 133
accel_per_hz: 75
hz_per_sec: 1 

#####################################################################
#   INPUT SHAPER     
#####################################################################

#[input_shaper]
#shaper_freq_x: 45.2
#shaper_type_x: mzv
#shaper_freq_y: 49.4
#shaper_type_y: 2hump_ei



#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA3
##  See https://www.klipper3d.org/Config_Reference.html#common-thermistors for additional options
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: PF3
max_power: 0.6
min_temp: 0
max_temp: 120
#control: pid
#pid_Kp=32.503
#pid_Ki=0.972
#pid_Kd=271.808


#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 40, 40
mesh_max: 210,210
fade_start: 3
fade_end: 10.0
fade_target: 0
probe_count: 7,7
algorithm: bicubic


#####################################################################
#   BEACON
#####################################################################

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_5B959C575157355957202020FF121E45-if00
x_offset: 0 # update with offset from nozzle on your machine
y_offset: 25 # update with offset from nozzle on your machine
mesh_main_direction: x
mesh_runs: 2
contact_max_hotend_temperature: 180 # increase to probe at print temps

home_xy_position: 125,125 # update with your safe position
home_z_hop: 15
home_z_hop_speed: 30
home_xy_move_speed: 300
home_method: contact # use proximity for induction homing
home_method_when_homed: proximity # after initial calibration use induction
home_autocalibrate: unhomed # contact will calibrate beacon on first home

[resonance_tester]
accel_chip: beacon
probe_points: 125, 125, 20

#####################################################################
#   Fan Control
#####################################################################

[fan]
pin: SHT36:gpio13
kick_start_time: 0.2

[heater_fan hotend_fan]
pin: SHT36:gpio21
heater: extruder
heater_temp: 50.0

[controller_fan Electronics_Fan]
##  Controller fan - FAN2
pin: PD12
kick_start_time: 0.1
heater: heater_bed

#[output_pin nevermore]
#pin: PD13
#value: 0
#shutdown_value: 0

#[temperature_fan Chamber_Exhaust_Fan]
##  Exhaust fan - FAN4
#pin: PD15
#max_power: 1.0
#kick_start_time: 0.100
#min_speed: 0
#shutdown_speed: 0
#sensor_type: ATC Semitec 104GT-2
#sensor_pin: PF7
#min_temp: 10
#max_temp: 100
#target_temp: 60
#control: watermark
#gcode_id: C
##That's my exhaust fan section. Then you can select the target temp with M141 in your print start gcode




#####################################################################
#   LED Control
#####################################################################

## Chamber Lighting - HE2 Connector (Optional)
[output_pin Caselight]
pin: PA8
pwm:true
shutdown_value: 0
value:1
cycle_time: 0.01



#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[quad_gantry_level]
gantry_corners:
   -60,-10
   310,320
##  Probe points
points:
   50,25
   50,200
   200,200
   200,25

#--------------------------------------------------------------------
speed: 100
horizontal_move_z: 10
retries: 7
retry_tolerance: 0.0075
max_adjust: 10


#####################################################################
#   Macros
#####################################################################

[include TEST_SPEED.cfg]
[exclude_object]

[gcode_macro PRINT_START]
gcode:
    # 1. Fetch temperatures passed from Orca Slicer
    {% set BED_TEMP = params.BED|default(60)|float %}
    {% set HOTEND_TEMP = params.HOTEND|default(210)|float %}

    # 2. Start heating the bed, keep nozzle safe and cold for the Beacon sensor
    M104 S150                                    ; Non-oozing temp to protect bed & Beacon
    M190 S{BED_TEMP}                             ; Wait for bed to reach full temperature

    # 3. Kinematics (Homing & Leveling)
    G90                                          ; Absolute positioning
    G28                                          ; Home all axes (Uses Beacon proximity)
    QUAD_GANTRY_LEVEL                            ; Level the Voron 2.4 gantry
    G28 Z                                        ; Re-home Z after gantry is leveled

    # 4. Bed Meshing with Beacon
    BED_MESH_CALIBRATE                           ; Fast Beacon mesh right before printing

    # 5. Move to Blobifier bucket and final heat
    # This prevents the nozzle from oozing onto your clean build plate
    BLOBIFIER_PARK                               ; Move toolhead to Blobifier tray/bucket
    M109 S{HOTEND_TEMP}                          ; Wait for nozzle to reach full printing temp

    # 6. Clear extruder position before Happy Hare takes over back in the Slicer
    G92 E0                                       ; Reset extruder distance


[gcode_macro G32]
gcode:
    SAVE_GCODE_STATE NAME=STATE_G32
    G90 ; Force absolute positioning
    G28 ; Clean, single homing pass of all axes
    QUAD_GANTRY_LEVEL ; Level the independent Z-steppers
    G28 Z ; Single re-home of Z axis to commit the QGL adjustment
    
    # Read the max limits directly
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    
    # Divide by 2 directly inside the movement command
    G0 X{max_x / 2} Y{max_y / 2} Z30 F3600 
    RESTORE_GCODE_STATE NAME=STATE_G32


[gcode_macro PRINT_END]
# Use PRINT_END for the slicer ending script
gcode:
    # Safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}

    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    M400                          ; Wait for buffer to clear
    G92 E0                        ; Zero the extruder

    # --- HAPPY HARE INTEGRATION ---
    MMU_END                       ; Retracts filament safely to the MMU while nozzle is hot
    CLEAN_NOZZLE                  ; Initial nozzle scrub
    TURN_OFF_HEATERS              ; Shut down heaters after MMU and scrubbing
    CLEAN_NOZZLE                  ; Final brush while cooling down

    G90                           ; Absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000 ; Quick move to snap any remaining wisps
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600 ; Park nozzle centered at rear
    
    #SET_PIN PIN=nevermore VALUE=0
    BED_MESH_CLEAR                ; Clear your Beacon mesh profile
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    M107                          ; Turn off fan

